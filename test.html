<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Background Quiz</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:#f5f5f8;
    overflow:hidden;
    position:relative;
    font-family:Arial, sans-serif;
}

/* Halo bleu */
body::before{
    content:"";
    position:absolute;
    width:700px;
    height:700px;
    left:-250px;
    bottom:-250px;

    background:#8fb2ff;
    border-radius:50%;
    filter:blur(180px);
    opacity:0.35;
}

/* Halo violet */
body::after{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    right:-200px;
    top:-200px;

    background:#b86dff;
    border-radius:50%;
    filter:blur(180px);
    opacity:0.25;
}

/* Lumière centrale */
.center-light{
    position:absolute;
    width:500px;
    height:500px;

    left:50%;
    top:50%;
    transform:translate(-50%,-50%);

    background:white;
    border-radius:50%;
    filter:blur(100px);
    opacity:.8;
}

/* Contenu */
.content{
    position:relative;
    z-index:10;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:250px;
    height:140px;

    background:white;
    border-radius:20px;

    box-shadow:
    0 10px 30px rgba(100,100,255,.08),
    0 2px 8px rgba(0,0,0,.03);
}
</style>
</head>
<body>

<div class="center-light"></div>

<div class="content">
    <div class="card"></div>
</div>

</body>
</html>
