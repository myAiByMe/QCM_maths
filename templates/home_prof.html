<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>home</title>
  <style>
    * { 
    margin: 0;
    padding: 0; 
    box-sizing: border-box; 
    }

    html, body { 
    width: 100%; 
    height: 100%; 
    }

    body {
      min-height: 100vh;
      background: #F0F1FE;
      overflow: hidden;
      position: relative;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
    }

    .header {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: left;
      justify-content: left;
      gap: 1.2vw;
      padding: 3vh 4vw 0;
    }
    
    .logo-wrap {
      width: 9vh;
      height: 9vh;
      border-radius: 50%;
      overflow: hidden;
      background: transparent;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .logo-wrap img {
      width: 95%;
      height: 95%;
      object-fit: cover;
      display: block;
    }
 
    .dot {
      position: fixed;
      border-radius: 50%;
      z-index: 1;
      pointer-events: none;
    }
    
    .dot-pink   { width: 2vw; height: 2vw; min-width: 10px; min-height: 10px; background: #F358AF; top: 8vh;  right: 15vw; }
    .dot-yellow { width: 1.8vw; height: 1.8vw; min-width: 9px;  min-height: 9px;  background: #f5c542; top: 18vh; left: 4.5vw; }
    .dot-purple { width: 1.9vw; height: 1.9vw; min-width: 9px;  min-height: 9px;  background: #7c6fff; bottom: 8vh; left: calc(50% + 1vw); }
    
    .plus {
      position: fixed;
      color: #8785FB;
      font-size: 3.2vw;
      font-weight: 600;
      line-height: 1;
      user-select: none;
      z-index: 1;
      pointer-events: none;
    }

    .plus-left  { bottom: 10vh; left: 2vw; }
    .plus-right { bottom: 50vh; right: 4vw; }
        
    .title-block h1 {
      font-size: clamp(22px, 3.5vw, 42px); font-weight: 800;
      color: #3b3bbf; line-height: 1.05; letter-spacing: -0.5px;
    }
    .title-block p {
      font-size: clamp(12px, 1.3vw, 17px); color: #9396b0;
      margin-top: 0.3vh; font-weight: 400;
    }

    .create_QCM{
      position: absolute;
      width: 70%;
      height: 20%;
      top: 23%;
      left: 50%;
      background-color: #FEFDFD;
      border-radius: 20px;
      transform: translateX(-50%) rotate(-1deg);
      box-shadow: 10px 10px 60px #D7D3F5;
      animation: create_QCM_anim 5s infinite;
      display: flex;
      align-items: center;
      padding: 0 40px;
    }

    #create_btn {
      position: absolute;
      top: 50%;
      right: 5%;
      transform: translateY(-50%);

      width: 180px;
      height: 60px;

      background-color: #5D3DF4;
      color: white;
      border: none;
      border-radius: 12px;

      font-size: medium;
      box-shadow: 8px 8px 30px #B3A8FF;

      transition: 0.4s;
    }

    #create_btn:hover {
      transition: 0.4s;
      transform: translateY(-50%) scale(1.05);
    }

    .qcm-content {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .icon-plus {
      background-color: #ECECFE;
      color: white;
      width: 100px;
      height: 100px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: bold;
    }

    .circle_icon {
      background-color: #7c6fff;
      color: white;
      width: 70px;
      height: 70px;
      border-radius: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: bold;
      z-index: 12;
    }

    .text-group h2 {
      color: #3b3bbf;
      margin-bottom: 5px;
    }

    .text-group p {
      color: #9396b0;
      font-size: 16px;
    }

    @keyframes create_QCM_anim {
      0% {transform: translateX(-50%) rotate(-1deg) scale(1);}
      50% {transform: translateX(-50%) rotate(-1deg) scale(1.03);}
      100% {transform: translateX(-50%) rotate(-1deg) scale(1);}
    }
  </style>
</head>
<body>
  
<div class="blob-blue"></div>
<div class="blob-purple"></div>
<div class="blob-center"></div>
 
<div class="dot dot-pink"></div>
<div class="dot dot-yellow"></div>
<div class="dot dot-purple"></div>
 
<div class="plus plus-left">+</div>
<div class="plus plus-right">+</div>
 
<div class="header">
  <div class="logo-wrap">
      <img src="/static/logo.png" alt="Logo Collège Théodore Monod">
    <h1>Monod Quiz</h1>
    <p>Dashboard Professeur</p>
  </div>
</div>

<div class="create_QCM">
  <div class="qcm-content">
    <div class="icon-plus">
      <div class="circle_icon">
        <span>+</span>
      </div>
    </div>
    <div class="text-group">
      <h2>Créer un nouveau QCM</h2>
      <p>Concevez votre propre questionnaire<br>en quelques clics !</p>
    </div>
  </div>
  <a href="create_QCM.html">
    <button id="create_btn">
      Créer un QCM ⟶
    </button>
  </a>
</div>

</body>
</html>
