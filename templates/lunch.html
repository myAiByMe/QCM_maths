<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monod Quiz - Classe en attente</title>

    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      background: #0F1547;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #FFFFFF;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 32px;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-wrap {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrap img {
      width: 90%;
      height: 90%;
      object-fit: cover;
    }

    .brand-label {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .quit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border-radius: 14px;
      background: #E43755;
      color: #FFFFFF;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 20px 40px rgba(228, 55, 85, 0.28);
      transition: transform 0.25s ease;
    }

    .quit-btn:hover {
      transform: scale(1.02);
    }

    .section-label {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      padding: 10px 0 20px;
      flex-shrink: 0;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(320px, 1.6fr) minmax(280px, 1fr);
      align-items: start;
      flex: 1;
      min-height: 0;
      margin-top: 5%;
    }

    .panel-r {
      border-right: 2px solid rgba(255,255,255,0.08);
      padding: 32px;
    }

    .panel-l {
      padding: 32px;
    }

    .code-panel {
      display: grid;
      gap: 18px;
      border-radius: 24px;
      text-align: center;
    }

    .code-label {
      color: #ffffff;
      letter-spacing: 0.08em;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .code-value {
      font-size: 6rem;
      height: 100%;
      width: 70%;
      margin: 0 auto;
      letter-spacing: 0.26em;
      text-align: center;
      color: #4C3EE0;
      background: #FFFFFF;
      background-color: #FFFFFF;
      border-radius: 22px;
      padding: 24px 0;
      font-weight: 800;
      transform: scale(0.9);
    }

    .connected-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 22px;
    }

    .student-list {
      display: grid;
      gap: 14px;
    }

    .student-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #35D33D;
      box-shadow: 0 0 10px rgba(53, 211, 61, 0.36);
    }

    .start-btn-wrap {
      display: flex;
      justify-content: center;
      padding: 24px 0 32px;
      flex-shrink: 0;
    }

    .start-btn {
      padding: 18px 48px;
      border: none;
      border-radius: 10px;
      background: #16B790;
      color: #FFFFFF;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 20px 44px rgba(22, 183, 144, 0.26);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .start-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 24px 52px rgba(22, 183, 144, 0.34);
    }
    </style>
</head>
<body>

  <header class="top-bar">
    <div class="brand">
      <div class="logo-wrap">
        <img src="/static/logo.png" alt="Logo Monod Quiz">
      </div>
      <p class="brand-label">Monod Quiz</p>
    </div>
    <a class="quit-btn" href="/prof_dashboard.html">Quitter la salle</a>
  </header>

  <p class="section-label">Classe en attente</p>

  <main class="content-grid">
    <section class="panel-r">
      <div class="code-panel">
        <p class="code-label">Code de connexion</p>
        <div class="code-value">{{CLASS_CODE}}</div>
      </div>
    </section>

    <section class="panel-l">
      <div class="connected-title">Élèves connectés :</div>
      <div class="student-list">
      </div>
    </section>
  </main>

  <div class="start-btn-wrap">
    <button class="start-btn">▶ Démarrer le quiz</button>
  </div>

</body>
</html>
