<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <title>Monod Quiz - Espace élève</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      min-height: 100vh;
      background: #F0F1FE;
      position: relative;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      overflow-y: auto;
    }
    .blob-1 {
      position: fixed; bottom: -80px; left: -80px;
      width: 300px; height: 300px; border-radius: 50%;
      background: radial-gradient(circle, #d7d3f540 0%, transparent 70%);
      z-index: 0; pointer-events: none;
    }
    .blob-2 {
      position: fixed; top: -60px; right: -60px;
      width: 250px; height: 250px; border-radius: 50%;
      background: radial-gradient(circle, #b3a8ff25 0%, transparent 70%);
      z-index: 0; pointer-events: none;
    }

    /* ── Header ── */
    .header {
      position: relative; z-index: 2;
      display: flex; align-items: center;
      gap: clamp(8px, 1.2vw, 18px);
      padding: 3vh clamp(20px, 4vw, 60px) 0;
    }
    .logo-wrap {
      width: clamp(42px, 9vh, 72px); height: clamp(42px, 9vh, 72px);
      border-radius: 50%; overflow: hidden; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transform: scale(1.4);
    }
    .logo-wrap img { width: 95%; height: 95%; object-fit: cover; display: block; }
    .title-block h1 {
      font-size: clamp(22px, 3.5vw, 42px); font-weight: 800;
      color: #3b3bbf; line-height: 1.05; letter-spacing: -0.5px;
    }
    .title-block p {
      font-size: clamp(12px, 1.3vw, 17px); color: #9396b0;
      margin-top: 2px; font-weight: 400;
    }

    /* ── Action Card (rejoindre une classe) ── */
    .actions-row {
      position: relative; z-index: 2;
      padding: 4vh clamp(20px, 4vw, 60px) 0;
      width: 80%;
      margin: 0 auto;
    }
    .action-card {
      min-height: clamp(120px, 20vh, 200px);
      background-color: #FEFDFD;
      border-radius: clamp(14px, 2vw, 20px);
      box-shadow: 10px 10px 60px #D7D3F5;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: clamp(24px, 3vh, 40px) clamp(24px, 4vw, 60px);
      gap: clamp(20px, 4vw, 60px);
    }
    .text-group { flex-shrink: 0; }
    .text-group h2 {
      color: #3b3bbf; margin-bottom: 6px;
      font-size: clamp(16px, 1.6vw, 22px); font-weight: 800;
    }
    .text-group p { color: #9396b0; font-size: clamp(11px, 1vw, 15px); line-height: 1.5; max-width: 220px; }

    /* Inputs code */
    .code-group { display: flex; flex-direction: column; gap: 8px; align-items: center; }
    .code-group label { font-size: clamp(11px, 1vw, 14px); color: #555; font-weight: 500; align-self: flex-start; }
    .code-inputs { display: flex; gap: 10px; }
    .code-input {
      width: clamp(48px, 6vw, 64px); height: clamp(48px, 6vw, 64px);
      border: 1.5px solid #D8D9EE; border-radius: 12px;
      background: #F8F7FF;
      font-size: clamp(18px, 2vw, 26px); font-weight: 700; color: #2a2a5e;
      text-align: center; text-transform: uppercase;
      outline: none; font-family: inherit; transition: 0.2s;
    }
    .code-input:focus { border-color: #5D3DF4; box-shadow: 0 0 0 3px #5D3DF420; background: white; }

    /* Bouton rejoindre */
    .btn-join {
      display: inline-flex; align-items: center; gap: 10px;
      height: clamp(44px, 5.5vh, 56px); padding: 0 clamp(20px, 3vw, 36px);
      background-color: #5D3DF4; color: white;
      border: none; border-radius: clamp(10px, 1.2vw, 14px);
      font-size: clamp(13px, 1.1vw, 16px); font-weight: 700;
      cursor: pointer; font-family: inherit;
      box-shadow: 6px 6px 24px #B3A8FF;
      transition: 0.3s; white-space: nowrap; flex-shrink: 0;
    }
    .btn-join:hover { transform: scale(1.05); box-shadow: 8px 8px 32px #B3A8FF; }
    .btn-join i { font-size: 1em; }

    /* ── Toolbar ── */
    .toolbar-section {
      position: relative; z-index: 2;
      padding: 4vh clamp(20px, 4vw, 60px) 0;
    }
    .toolbar-top {
      display: flex; align-items: center;
      gap: clamp(10px, 1.2vw, 16px); flex-wrap: wrap;
    }
    .toolbar-top h2 {
      color: #3b3bbf; font-size: clamp(16px, 1.6vw, 22px);
      font-weight: 700; margin-right: auto;
    }
    .search-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      width: clamp(140px, 18vw, 260px);
    }
    .search-icon {
      position: absolute;
      left: 11px;
      color: #b0b3c7;
      font-size: 14px;
      pointer-events: none;
    }
    .search {
      height: clamp(36px, 4.2vh, 40px); width: 100%;
      border: 1px solid #dadbe9; border-radius: 5px; padding: 0 12px 0 32px;
      font-size: clamp(12px, 1vw, 14px); color: #555; outline: none;
      font-family: inherit; background: white;
    }
    .search::placeholder { color: #b0b3c7; }
    .search:focus { border-color: #5D3DF4; box-shadow: 0 0 0 3px #5D3DF420; }

    #avaible-theme, #avaible-class {
      height: clamp(36px, 4.2vh, 40px); width: clamp(120px, 14vw, 200px);
      border: 1px solid #dadbe9; border-radius: 5px; padding: 0 28px 0 10px;
      background-color: white; font-size: clamp(12px, 1vw, 14px); cursor: pointer;
      font-family: inherit; color: #555; outline: none;
      appearance: none; -webkit-appearance: none; -moz-appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg fill="gray" height="14" width="14" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><polygon points="0,0 20,0 10,12"/></svg>');
      background-repeat: no-repeat; background-position: right 8px center;
    }
    #avaible-theme:focus, #avaible-class:focus {
      border-color: #5D3DF4; box-shadow: 0 0 0 3px #5D3DF420;
    }

    /* ── Tabs ── */
    .tabs-row {
      display: flex; gap: 0;
      margin-top: clamp(14px, 2vh, 20px);
      border-bottom: 2px solid #E0DFF5;
    }
    .tab-btn {
      padding: 8px 0; margin-right: clamp(18px, 2vw, 28px);
      font-size: clamp(12px, 1vw, 14px);
      background: none; border: none; color: #9396b0; cursor: pointer;
      font-family: inherit; transition: color 0.3s;
      position: relative; bottom: -2px; border-bottom: 2px solid transparent;
    }
    .tab-btn.active { color: #3b3bbf; font-weight: 600; border-bottom-color: #5D3DF4; }
    .tab-btn:hover:not(.active) { color: #5D3DF4; }

    /* ── Empty State ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      gap: clamp(12px, 2vh, 18px);
      padding: clamp(36px, 6vh, 60px) 20px 80px; user-select: none;
    }
    .empty-icon-wrap {
      width: clamp(80px, 12vw, 120px); height: clamp(80px, 12vw, 120px);
      border-radius: 50%;
      background: linear-gradient(135deg, #E8E6FF 0%, #D7D3F5 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 30px #D7D3F580;
    }
    .empty-icon-wrap i { font-size: clamp(30px, 4vw, 48px); color: #9089D4; }
    .empty-state h3 { color: #3b3bbf; font-size: clamp(17px, 2vw, 22px); font-weight: 700; }
    .empty-state p {
      color: #9396b0; font-size: clamp(13px, 1.2vw, 15px);
      text-align: center; max-width: 340px; line-height: 1.6;
    }

    /* ── QCM Cards ── */
    .qcm-list {
      padding-top: clamp(14px, 2vh, 20px);
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: clamp(12px, 1.5vh, 16px);
    }
    .qcm-card {
      width: clamp(220px, 30%, 340px);
      background: #FEFDFD;
      padding: clamp(18px, 2.5vh, 24px) clamp(18px, 3vw, 28px);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      border-radius: clamp(14px, 2vw, 20px);
      box-shadow: 6px 6px 30px rgba(183, 170, 255, 0.18);
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .qcm-card:hover {
      background: #F8F7FF;
      transform: translateY(-2px);
      box-shadow: 8px 8px 40px rgba(183, 170, 255, 0.28);
    }
    .qcm-card-title {
      font-size: clamp(15px, 1.4vw, 18px);
      font-weight: 700;
      color: #2a2a5e;
      margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .qcm-card-author {
      font-size: clamp(12px, 1vw, 14px);
      color: #9396b0;
      margin-bottom: 8px;
    }
    .qcm-card-meta {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .qcm-card-badge {
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em;
      padding: 2px 8px; border-radius: 4px;
    }
    .qcm-card-badge.public { background: #E6F4EA; color: #1A7F37; }
    .qcm-card-badge.prive  { background: #FEF3E0; color: #B36A00; }
    .qcm-card-count { font-size: clamp(11px, 0.9vw, 13px); color: #b0b3c7; }
    .qcm-card-count i { margin-right: 3px; }
    .qcm-card-view {
      font-size: clamp(13px, 1.1vw, 15px);
      font-weight: 600;
      color: #5D3DF4;
      text-decoration: none;
      white-space: nowrap;
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 4px;
      transition: color 0.2s;
    }
    .qcm-card-view i { font-size: 0.8em; transition: transform 0.2s; }
    .qcm-card-view:hover { color: #4330b8; }
    .qcm-card-view:hover i { transform: translateX(3px); }

    @media (max-width: 640px) {
      .actions-row { flex-direction: column; }
      .header { padding: 2.5vh 6vw 0; }
      .toolbar-section { padding: 3vh 6vw 0; }
      .toolbar-top { flex-direction: column; align-items: stretch; gap: 10px; }
      .toolbar-top h2 { margin-right: 0; }
      .search, #avaible-theme, #avaible-class { width: 100%; height: 44px; }
      .search-wrap { width: 100%; }
      .qcm-card { flex-direction: column; align-items: flex-start; padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="blob-1"></div>
  <div class="blob-2"></div>

  <div class="header">
    <div class="logo-wrap">
      <img src="logo.png" alt="Logo Collège Théodore Monod">
    </div>
    <div class="title-block">
      <h1>Monod Quiz</h1>
      <p>Espace élève</p>
    </div>
  </div>

  <div class="actions-row">
    <div class="action-card">
      <div class="text-group">
        <h2>Rejoindre une classe</h2>
        <p>Entrez le code de votre professeur pour rejoindre sa session en cours.</p>
      </div>
      <div class="code-group">
        <label>Code de la classe</label>
        <div class="code-inputs">
          <input class="code-input" maxlength="1" id="c1">
          <input class="code-input" maxlength="1" id="c2">
          <input class="code-input" maxlength="1" id="c3">
          <input class="code-input" maxlength="1" id="c4">
        </div>
      </div>
      <button class="btn-join" onclick="rejoindre()">
        Rejoindre <i class="fa-solid fa-arrow-right"></i>
      </button>
    </div>
  </div>

  <div class="toolbar-section">
    <div class="toolbar-top">
      <h2>Tous les QCM disponibles</h2>
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" placeholder="Rechercher un QCM" class="search" id="searchInput">
      </div>
      <select id="avaible-theme">
        <option value="all">Tous les thèmes</option>
      </select>
      <select id="avaible-class">
        <option value="all">Toutes les classes</option>
        <option value="6éme">6éme</option>
        <option value="5ème">5ème</option>
        <option value="4ème">4ème</option>
        <option value="3ème">3ème</option>
        <option value="2nde">2nde</option>
      </select>
    </div>

    <div id="qcmContainer">
      <div class="empty-state">
        <div class="empty-icon-wrap">
          <i class="fa-regular fa-folder-open"></i>
        </div>
        <h3>Aucun QCM disponible</h3>
      </div>
    </div>
  </div>
  <script>
    const inputs = document.querySelectorAll('.code-input');
    inputs.forEach((input, i) => {
      input.addEventListener('input', () => {
        input.value = input.value.toUpperCase();
        if (input.value && i < inputs.length - 1) inputs[i + 1].focus();
      });
      input.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !input.value && i > 0) inputs[i - 1].focus();
      });
    });

    function rejoindre() {
      const code = [...inputs].map(i => i.value).join('');
      if (code.length < 4) { inputs[[...inputs].findIndex(i => !i.value)].focus(); return; }
      window.location.href = `join_class.html?code=${code}`;
    }
  </script>
</body>
</html>
