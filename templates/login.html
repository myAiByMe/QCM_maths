<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monod Quiz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; }
body {
  min-height: 100vh;
  background: #e8eaf5;
  overflow: hidden;
  position: relative;
  font-family: 'Segoe UI', Arial, sans-serif;
  display: flex;
  flex-direction: column;
}

.blob-blue {
  position: fixed; width: 70vw; height: 70vw; left: -25vw; bottom: -25vw;
  background: #7fa8f8; border-radius: 50%; filter: blur(12vw); opacity: 0;
  pointer-events: none; z-index: 0;
  transition: opacity 0.8s ease;
}
.blob-purple {
  position: fixed; width: 60vw; height: 60vw; right: -20vw; top: -20vw;
  background: #b46dff; border-radius: 50%; filter: blur(12vw); opacity: 0;
  pointer-events: none; z-index: 0;
  transition: opacity 0.8s ease;
}
.blob-center {
  position: fixed; width: 50vw; height: 50vw; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  background: white; border-radius: 50%; filter: blur(8vw); opacity: 0;
  pointer-events: none; z-index: 0;
  transition: opacity 0.8s ease;
}
.blob-blue.visible  { opacity: 0.38; }
.blob-purple.visible { opacity: 0.28; }
.blob-center.visible { opacity: 0.75; }

.dot { position: fixed; border-radius: 50%; z-index: 1; pointer-events: none; opacity: 0; }
.dot-pink   { width: 1.4vw; height: 1.4vw; min-width: 10px; min-height: 10px; background: #f0176f; top: 8vh;  right: 7vw; }
.dot-yellow { width: 1.2vw; height: 1.2vw; min-width: 9px;  min-height: 9px;  background: #f5c542; top: 18vh; left: 4.5vw; }
.dot-purple { width: 1.2vw; height: 1.2vw; min-width: 9px;  min-height: 9px;  background: #7c6fff; bottom: 8vh; left: calc(50% + 1vw); }

.plus { position: fixed; color: #9ba4cb; font-size: 2.2vw; font-weight: 300; line-height: 1; user-select: none; z-index: 1; pointer-events: none; opacity: 0; }
.plus-left  { bottom: 40vh; left: 30vw; }
.plus-right { bottom: 28vh; right: 4vw; }

.header {
  position: relative; z-index: 2;
  display: flex; align-items: center; justify-content: center;
  gap: 1.2vw; padding: 3vh 4vw 0;
  opacity: 0; transition: opacity 0.5s ease;
}
.header.visible { opacity: 1; }

.logo-wrap {
  width: 9vh; height: 9vh; border-radius: 50%; overflow: hidden;
  background: transparent; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.logo-wrap img { width: 95%; height: 95%; object-fit: cover; display: block; }
.logo-fallback {
  width: 100%; height: 100%;
  background: conic-gradient(#e74c3c 0deg 90deg, #3498db 90deg 180deg, #2ecc71 180deg 270deg, #e67e22 270deg 360deg);
  display: none; align-items: center; justify-content: center;
  color: white; font-size: 2.5vh; font-weight: 700;
}

.title-block h1 { font-size: clamp(22px, 3.5vw, 42px); font-weight: 800; color: #3b3bbf; line-height: 1.05; letter-spacing: -0.5px; }
.title-block p  { font-size: clamp(12px, 1.3vw, 17px); color: #9396b0; margin-top: 0.3vh; font-weight: 400; }

.arena { position: relative; z-index: 2; flex: 1; display: flex; align-items: center; justify-content: center; }

.cards-scene { position: relative; width: 82vw; height: 62vh; max-width: 1100px; max-height: 580px; }

.theme-card {
  position: absolute; background: white; border-radius: 2vw;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(12px,1.2vw,16px); font-weight: 500; color: #666; text-align: center;
  padding: 1.5vh; opacity: 0;
  transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.4s ease;
}
.card-tl { width: 33%; height: 44%; top: 3%; left: 0; transform: rotate(-4deg) scale(0) translate(40%, 40%); box-shadow: 8px 0px 20px #D7D3F5; }
.card-tl:hover { transform: rotate(-4deg) scale(1.04) !important; }
.card-tr { width: 33%; height: 44%; top: 3%; right: 0; transform: rotate(4deg) scale(0) translate(-40%, 40%); box-shadow: 0 8px 20px #D7D3F5; }
.card-tr:hover { transform: rotate(4deg) scale(1.04) !important; }
.card-bl { width: 32%; height: 40%; bottom: 3%; left: 2%; transform: rotate(3deg) scale(0) translate(40%, -40%); box-shadow: 0 8px 20px #D7D3F5; }
.card-bl:hover { transform: rotate(3deg) scale(1.04) !important; }
.card-br { width: 32%; height: 40%; bottom: 3%; right: 2%; transform: rotate(-3deg) scale(0) translate(-40%, -40%); box-shadow: 0 8px 20px #D7D3F5; }
.card-br:hover { transform: rotate(-3deg) scale(1.04) !important; }
.card-tl.exploded { transform: rotate(-4deg) scale(1) translate(0,0); opacity: 1; }
.card-tr.exploded { transform: rotate(4deg) scale(1) translate(0,0); opacity: 1; }
.card-bl.exploded { transform: rotate(3deg) scale(1) translate(0,0); opacity: 1; }
.card-br.exploded { transform: rotate(-3deg) scale(1) translate(0,0); opacity: 1; }

.halo-btn {
  position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
  z-index: 10; width: 22vw; height: 22vw; max-width: 170px; max-height: 170px;
  border-radius: 50%; background: transparent;
  border: 3.5px solid rgba(255,255,255,0.45);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  opacity: 0; transition: opacity 0.3s ease;
  animation: btn-anim 4s infinite;
}
.halo-btn.visible { opacity: 1; }

.play-btn {
  position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
  z-index: 10; width: 14vw; height: 14vw; max-width: 130px; max-height: 130px;
  border-radius: 50%; background: rgba(255,255,255,0.45);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.play-inner {
  width: 75%; height: 75%; border-radius: 50%; background: #7c6fff;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s ease, transform 0.15s ease;
}
.play-btn:hover .play-inner { background: #5a48e0; transform: scale(1.06); }
.play-icon {
  width: 0; height: 0; border-style: solid;
  border-width: 1.2vw 0 1.2vw 2.2vw;
  border-color: transparent transparent transparent white;
  margin-left: 0.4vw;
}

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.38);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.22s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: #fff; border-radius: 20px; padding: 2rem 1.75rem;
  width: 340px; max-width: 92vw;
  display: flex; flex-direction: column; align-items: center; gap: 1.25rem;
  box-shadow: 0 8px 40px rgba(80,80,200,0.18);
  transform: scale(0.92); transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-overlay.open .modal { transform: scale(1); }
.modal h2 { font-size: 1.1rem; font-weight: 700; color: #3b3bbf; }
.avatar-preview {
  width: 72px; height: 72px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; font-weight: bold; color: #fff;
  background: #7c6fff; transition: background 0.2s;
}
.role-select { display: flex; gap: 0.75rem; width: 100%; }
.role-btn {
  flex: 1; padding: 0.6rem 0; border-radius: 10px;
  border: 1.5px solid #e2e8f0; background: #f1f5f9;
  font-size: 0.9rem; cursor: pointer; font-weight: 600; color: #475569;
  transition: border-color 0.15s, background 0.15s;
}
.role-btn.active-prof  { border-color: #2563eb; background: #dbeafe; color: #1d4ed8; }
.role-btn.active-eleve { border-color: #16a34a; background: #dcfce7; color: #15803d; }
.modal input[type="text"] {
  width: 100%; border: 1.5px solid #e2e8f0; border-radius: 10px;
  padding: 0.6rem 1rem; font-size: 1rem; outline: none; text-align: center;
  color: #1a1a1a; transition: border-color 0.15s;
}
.modal input[type="text"]:focus { border-color: #7c6fff; }
.modal-actions { display: flex; gap: 0.75rem; width: 100%; }
.modal-actions button {
  flex: 1; padding: 0.65rem; border-radius: 10px; font-size: 0.95rem;
  cursor: pointer; border: 1.5px solid #e2e8f0; background: #f1f5f9;
  color: #1a1a1a; font-weight: 600; transition: background 0.15s;
}
.modal-actions button:hover { background: #e2e8f0; }
.modal-actions .btn-valider { background: #7c6fff; color: #fff; border-color: transparent; }
.modal-actions .btn-valider:hover { background: #5a48e0; }

.profiles-modal { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; width: 100%; }
.profile-card-mini {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  cursor: pointer; padding: 8px; border-radius: 12px;
  border: 2px solid transparent; transition: border-color 0.15s, background 0.15s;
}
.profile-card-mini:hover { background: #f1f5f9; }
.avatar-mini {
  width: 48px; height: 48px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; font-weight: bold; color: #fff;
}
.avatar-mini-label { font-size: 0.72rem; color: #475569; max-width: 64px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.role-badge { font-size: 0.65rem; padding: 1px 7px; border-radius: 100px; font-weight: 600; }
.role-prof  { background: #dbeafe; color: #1d4ed8; }
.role-eleve { background: #dcfce7; color: #15803d; }
.separator { width: 100%; text-align: center; font-size: 0.8rem; color: #94a3b8; position: relative; }
.separator::before, .separator::after {
  content: ''; position: absolute; top: 50%; width: 35%; height: 1px; background: #e2e8f0;
}
.separator::before { left: 0; }
.separator::after  { right: 0; }
.btn-nouveau {
  width: 100%; padding: 0.6rem; border-radius: 10px;
  border: 1.5px dashed #c4b5fd; background: transparent;
  color: #7c6fff; font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: background 0.15s;
}
.btn-nouveau:hover { background: #f5f3ff; }

@keyframes dotFloat {
  0%   { opacity: 0; transform: scale(0) translate(var(--ox), var(--oy)); }
  60%  { opacity: 1; transform: scale(1.4) translate(0,0); }
  80%  { opacity: 1; transform: scale(0.85); }
  100% { opacity: 1; transform: scale(1); }
}
@keyframes plusPop {
  0%   { opacity: 0; transform: scale(0) rotate(0deg); }
  60%  { opacity: 1; transform: scale(1.3) rotate(180deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}

@keyframes btn-anim {
  0% {transform: translate(-50%, -50%) scale(1);}
  50% {transform: translate(-50%, -50%) scale(1.2);}
  100% {transform: translate(-50%, -50%) scale(1);}
}
</style>
</head>
<body>

<div class="blob-blue" id="blobBlue"></div>
<div class="blob-purple" id="blobPurple"></div>
<div class="blob-center" id="blobCenter"></div>
<div class="dot dot-pink" id="dotPink"></div>
<div class="dot dot-yellow" id="dotYellow"></div>
<div class="dot dot-purple" id="dotPurple"></div>
<div class="plus plus-left" id="plusLeft">+</div>
<div class="plus plus-right" id="plusRight">+</div>

<div class="header" id="header">
  <div class="logo-wrap">
    <img src="/static/logo.png" alt="Logo Collège Théodore Monod"
         onerror="this.style.display='none'; document.querySelector('.logo-fallback').style.display='flex'">
    <div class="logo-fallback">M</div>
  </div>
  <div class="title-block">
    <h1>Monod Quiz</h1>
    <p>Choisis ton thème et joue !</p>
  </div>
</div>

<div class="arena">
  <div class="cards-scene">
    <div class="theme-card card-tl" id="cardTL"></div>
    <div class="theme-card card-tr" id="cardTR"></div>
    <div class="theme-card card-bl" id="cardBL"></div>
    <div class="theme-card card-br" id="cardBR"></div>

    <div class="halo-btn" id="haloBtn">
      <div class="play-btn" id="playBtn" onclick="ouvrirModal()">
        <div class="play-inner">
          <div class="play-icon"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="overlay" onclick="fermerSiDehors(event)">
  <div class="modal" id="modalContent">
  </div>
</div>

<script>
  const COULEURS_PROF  = ['#2563eb','#7c3aed','#0891b2'];
  const COULEURS_ELEVE = ['#16a34a','#d97706','#dc2626'];
  let profiles = JSON.parse(localStorage.getItem('home_eleve_profiles') || '[]');
  let roleChoisi = null, couleurIdx = 0;
  let modeCreation = false;

  function initiales(n) { return n.trim().slice(0,2).toUpperCase() || '?'; }
  function sauver() { localStorage.setItem('home_eleve_profiles', JSON.stringify(profiles)); }

  function ouvrirModal() {
    modeCreation = false;
    const modal = document.getElementById('modalContent');

    if (profiles.length === 0) {
      afficherFormulaire();
      document.getElementById('overlay').classList.add('open');
      return;
    }

    let html = `<h2>Qui joue ?</h2><div class="profiles-modal" id="profilesModal">`;
    profiles.forEach((p, i) => {
      html += `
        <div class="profile-card-mini" onclick="selectionner(${i})">
          <div class="avatar-mini" style="background:${p.couleur}">${initiales(p.nom)}</div>
          <span class="avatar-mini-label">${p.nom}</span>
          <span class="role-badge role-${p.role}">${p.role==='prof'?'Prof':'Élève'}</span>
        </div>`;
    });
    html += `</div>
      <div class="separator">ou</div>
      <button class="btn-nouveau" onclick="afficherFormulaire()">+ Nouveau profil</button>
      <div class="modal-actions">
        <button onclick="fermerModal()">Fermer</button>
      </div>`;
    modal.innerHTML = html;
    document.getElementById('overlay').classList.add('open');
  }

  function afficherFormulaire() {
    roleChoisi = null; couleurIdx = 0;
    const modal = document.getElementById('modalContent');
    modal.innerHTML = `
      <h2>Nouveau profil</h2>
      <div class="avatar-preview" id="apercu">?</div>
      <div class="role-select">
        <button class="role-btn" id="btnProf"  onclick="choisirRole('prof')">Professeur</button>
        <button class="role-btn" id="btnEleve" onclick="choisirRole('eleve')">Élève</button>
      </div>
      <input type="text" id="champNom" placeholder="Votre prénom ou pseudo" maxlength="20" oninput="mettreAJourApercu()" />
      <div class="modal-actions">
        <button onclick="${profiles.length > 0 ? 'ouvrirModal()' : 'fermerModal()'}">Retour</button>
        <button class="btn-valider" onclick="confirmer()">Ajouter</button>
      </div>`;
    setTimeout(() => document.getElementById('champNom').focus(), 120);
  }

  function fermerModal() { document.getElementById('overlay').classList.remove('open'); }
  function fermerSiDehors(e) { if (e.target === document.getElementById('overlay')) fermerModal(); }

  function choisirRole(role) {
    roleChoisi = role;
    document.getElementById('btnProf').className  = 'role-btn' + (role==='prof'  ? ' active-prof'  : '');
    document.getElementById('btnEleve').className = 'role-btn' + (role==='eleve' ? ' active-eleve' : '');
    couleurIdx = profiles.filter(p => p.role===role).length % (role==='prof' ? COULEURS_PROF.length : COULEURS_ELEVE.length);
    mettreAJourApercu();
  }

  function mettreAJourApercu() {
    const nom = document.getElementById('champNom').value;
    const apercu = document.getElementById('apercu');
    apercu.textContent = initiales(nom) || '?';
    const couleurs = roleChoisi==='eleve' ? COULEURS_ELEVE : COULEURS_PROF;
    apercu.style.background = couleurs[couleurIdx % couleurs.length];
  }

  function confirmer() {
    const nom = document.getElementById('champNom').value.trim();
    if (!nom) { document.getElementById('champNom').focus(); return; }
    if (!roleChoisi) { alert('Choisissez un rôle.'); return; }
    const couleurs = roleChoisi==='eleve' ? COULEURS_ELEVE : COULEURS_PROF;
    profiles.push({ nom, role: roleChoisi, couleur: couleurs[couleurIdx % couleurs.length] });
    sauver();
    fermerModal();
    const p = profiles[profiles.length - 1];
    localStorage.setItem('home_eleve_user', JSON.stringify(p));
    rediriger(p);
  }

  function selectionner(i) {
    const p = profiles[i];
    localStorage.setItem('home_eleve_user', JSON.stringify(p));
    fermerModal();
    rediriger(p);
  }

  function rediriger(p) {
    if (p.role === 'prof') {
      window.location.href = '/dashboard_prof';
    } else {
      window.location.href = 'home_eleve.html';
    }
  }

  document.addEventListener('keydown', e => {
    const overlay = document.getElementById('overlay');
    if (e.key === 'Escape') fermerModal();
    if (e.key === 'Enter' && overlay.classList.contains('open')) {
      const champNom = document.getElementById('champNom');
      if (champNom) confirmer();
    }
  });

  window.addEventListener('load', () => {
    const playBtn = document.getElementById('playBtn');
    playBtn.style.transform = 'translate(-50%, -50%) scale(0)';
    playBtn.style.opacity = '0';
    playBtn.style.transition = 'none';

    setTimeout(() => {
      playBtn.style.transition = 'transform 0.5s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease';
      playBtn.style.opacity = '1';
      playBtn.style.transform = 'translate(-50%, -50%) scale(1)';
    }, 100);

    setTimeout(() => { document.getElementById('haloBtn').classList.add('visible'); }, 250);

    const cards = [
      { el: document.getElementById('cardTL'), delay: 320 },
      { el: document.getElementById('cardTR'), delay: 400 },
      { el: document.getElementById('cardBL'), delay: 480 },
      { el: document.getElementById('cardBR'), delay: 560 },
    ];
    cards.forEach(({ el, delay }) => {
      el.style.transition = `transform 0.55s cubic-bezier(0.34,1.46,0.64,1) ${delay}ms, opacity 0.3s ease ${delay}ms`;
      setTimeout(() => el.classList.add('exploded'), delay);
    });

    document.getElementById('blobBlue').classList.add('visible');
    document.getElementById('blobPurple').classList.add('visible');
    document.getElementById('blobCenter').classList.add('visible');

    const dotPink = document.getElementById('dotPink');
    dotPink.style.setProperty('--ox', '80px');
    dotPink.style.setProperty('--oy', '80px');
    setTimeout(() => { dotPink.style.animation = 'dotFloat 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards'; }, 500);

    const dotYellow = document.getElementById('dotYellow');
    dotYellow.style.setProperty('--ox', '-60px');
    dotYellow.style.setProperty('--oy', '60px');
    setTimeout(() => { dotYellow.style.animation = 'dotFloat 0.6s cubic-bezier(0.34,1.56,0.64,1) 80ms forwards'; }, 500);

    const dotPurple = document.getElementById('dotPurple');
    dotPurple.style.setProperty('--ox', '0px');
    dotPurple.style.setProperty('--oy', '-80px');
    setTimeout(() => { dotPurple.style.animation = 'dotFloat 0.6s cubic-bezier(0.34,1.56,0.64,1) 160ms forwards'; }, 500);

    setTimeout(() => { document.getElementById('plusLeft').style.animation  = 'plusPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards'; }, 650);
    setTimeout(() => { document.getElementById('plusRight').style.animation = 'plusPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 80ms forwards'; }, 650);

    document.getElementById('header').classList.add('visible');
  });
</script>
</body>
</html>
